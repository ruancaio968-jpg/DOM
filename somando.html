<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somando Números</title>
    <style>
        body{
           font: normal, 18pt arial;
           background-color: coral;
           color: aliceblue;

        }
        input{
            font: normal, 18pt arial;
            width: 100px;
            background-color: rgb(53, 73, 58);
            color: #fff1f1;
            overflow: auto;
            margin: 20px;
            align-items: center;
        }
        div#res{
            margin-top: 20px;  
        }
    </style>
</head>
<body>
    
    <h1>Somando Números</h1>
    <input type="number" name="textn1" id="textn1">    
    <input type="number" name="textn2" id="textn2">
    <input type="button" value="somar" onclick="somar()">
    <div id="res">Resultado</div>
    <script>
        function somar(){
            var tn1 = document.getElementById('textn1')
            var tn2 = document.querySelector('input#textn2')
            var n1 = Number(tn1.value)
            var n2 = Number(tn2.value)
            var s = n1 + n2 
            var res = document.getElementById('res')
            res.innerHTML = `A soma entre ${n1} e ${n2} é igual a <strong>${s}</strong> `
        }
    </script>
</body>
</html>
