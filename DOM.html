<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos DOM</title>
    <style>
        div#area{
            font: normal 20pt arial;
            background-color: #379e7c;/*cor de fundo*/
            color: aliceblue; /*cor da letra*/
            width: 200px; /*largura*/
            height: 200px; /*altura*/
            line-height: 200px;/* msm altura*/
            text-align: center; 
        }
    </style>
</head>
<body>
    <div id="area" onclick="clicar()" onmouseenter="entrar()" onmouseout="sair()">
        Interaja...

    </div>
    <script> 
    var a = document.getElementById('area')
    a.addEventListener('clik', clicar)
    a.addEventListener('mouseenter', entrar)
    a.addEventListener('mouseout', sair)
        function clicar(){
             a.innerText = 'clicou!'
             a.style.background = 'gray'
        }
        function entrar(){
            a.innerText ='Entrou!'
        }
        function sair(){
            a.innerText = 'Saiu!'
            a.style.background = 'green'
        }
    </script>
</body>
</html>
